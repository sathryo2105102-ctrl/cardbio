<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nickname — Bio Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0a;
    --violet: #d9d9d9;
    --cyan: #ffffff;
    --text: #f2f2f2;
    --muted: #9a9a9a;
    --glass: rgba(10, 10, 10, 0.22);
    --glass-border: rgba(255, 255, 255, 0.15);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    height:100%;
    font-family:'Inter', sans-serif;
    color: var(--text);
    overflow-x:hidden;
  }

  /* ================= BACKGROUND VIDEO ================= */
  .bg-wrap{
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow:hidden;
  }

  .bg-wrap video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
object-position:50% 50%;
filter:none;
}

  .bg-fallback{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 20% 10%, rgba(160,160,160,0.35), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(230,230,230,0.25), transparent 50%),
      #0a0c13;
  }

  .bg-overlay{
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(180deg, rgba(6,7,11,0.18) 0%, rgba(6,7,11,0.32) 45%, rgba(6,7,11,0.75) 100%);
  }

  .scanline{display:none;
    position: fixed;
    inset:0;
    z-index: 2;
    pointer-events:none;
    opacity: 0.05;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.6) 0px,
      rgba(255,255,255,0.6) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  /* ================= LAYOUT ================= */
  .page{
    position: relative;
    z-index: 3;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 9vh 20px 40px;
  }

  /* ---- profile row: pfp + nickname side by side ---- */
  .profile-row{
    width:100%;
    max-width: 380px;
    display:flex;
    align-items:center;
    gap:18px;
    padding: 16px 4px;
  }

  .avatar-frame{
    position: relative;
    width: 68px;
    height: 68px;
    flex-shrink:0;
  }

  .avatar-frame img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.15);
    display:block;
    filter: grayscale(1);
  }

  .id-block{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .id-block .nickname{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 1.35rem;
    letter-spacing: 0.3px;
    line-height:1.1;
    background: linear-gradient(90deg, #fff, var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .id-block .tagline{
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.4px;
  }

  .id-block .tagline::before{
    content: "● ";
    color: var(--cyan);
    font-size: 0.6rem;
  }

  /* ---- kotak foto, rasio 9:16, simple ---- */
  .photo-box{
    width: 100%;
    max-width: 380px;
    margin: 16px auto 0;
    background: var(--glass);
    border: 1.5px solid var(--glass-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px;
    border-radius: 12px;
    box-shadow: 0 14px 28px -12px rgba(0,0,0,0.6);
  }

  .photo-box-photo{
    width: 100%;
    aspect-ratio: 21 / 9;
    border-radius: 8px;
    overflow: hidden;
    background:#000;
  }

  .photo-box-photo img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
    filter: grayscale(1);
  }

  /* ---- links ---- */
  .links{
    width:100%;
    max-width: 380px;
    margin-top: 34px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .section-label{
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 22px 2px 10px;
  }

  .link-card{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color: var(--text);
    background: var(--glass);
    border: 1.5px solid var(--glass-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 18px;
    border-radius: 8px;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }

  /* kotak dobel garis seperti di sketsa, untuk link utama/game */
  .link-card.featured{
    position:relative;
    border: 1.5px solid rgba(255,255,255,0.5);
    padding: 16px 20px;
  }

  .link-card.featured::before{
    content:"";
    position:absolute;
    inset: 4px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 5px;
    pointer-events:none;
  }

  .link-card:hover, .link-card:focus-visible{
    transform: translateY(-2px);
    border-color: rgba(160,160,160,0.55);
    background: rgba(30, 26, 48, 0.6);
    outline: none;
  }

  .link-card:focus-visible{
    box-shadow: 0 0 0 2px var(--cyan);
  }

  .link-icon{
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    background: rgba(255,255,255,0.06);
  }

  .link-icon svg{ width:20px; height:20px; }

  .link-text{ flex:1; }

  .link-title{ font-weight:600; font-size:0.92rem; }
  .link-sub{ font-size:0.72rem; color: var(--muted); }

  .link-arrow{ color: var(--muted); font-size:1rem; }

  .link-card.game{
    border-color: rgba(230,230,230,0.35);
    background: linear-gradient(135deg, rgba(230,230,230,0.09), rgba(160,160,160,0.09));
  }

  .link-card.game .link-icon{
    background: rgba(230,230,230,0.15);
  }

  .section-label{ display:none; }

  footer{
    margin-top: 38px;
    font-size: 0.68rem;
    color: rgba(147,160,184,0.6);
    letter-spacing: 0.5px;
  }

  @media (prefers-reduced-motion: reduce){
  }
</style>
</head>
<body>

  <div class="bg-wrap">
    <!-- Video background: torii (seamless boomerang loop, no jump-cut) -->
    <video id="bgVideo" autoplay muted loop playsinline preload="auto">
      <source src="b&wvid.mp4" type="video/mp4">
    </video>
    
  </div>
  <div class="bg-overlay"></div>
  <div class="scanline"></div>

  <div class="page">

    <!-- PROFILE: foto profil di kiri, nickname di kanan -->
    <div class="profile-row">
      <div class="avatar-frame">
        <!-- Foto profil -->
        <img src="kanekikenn1.jpeg" alt="Foto profil">
      </div>
      <div class="id-block">
        <div class="nickname">yoyoouv</div>
      </div>
    </div>

    <!-- KOTAK FOTO: rasio 9:16, simple -->
    <div class="photo-box">
      <div class="photo-box-photo">
        <!-- Foto momen -->
        <img src="kaneki219.jpeg" alt="Foto momen">
      </div>
    </div>

    <!-- LINKS -->
    <div class="links">

      <!-- bar polos -->
      <a class="link-card" href="https://www.instagram.com/yoyoouuv/" target="_blank" rel="noopener">
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e8e8e8" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
        </div>
        <div class="link-text">
          <div class="link-title">Instagram</div>
          <div class="link-sub">@yoyoouuv</div>
        </div>
        <div class="link-arrow">→</div>
      </a>

      <a class="link-card" href="https://www.tiktok.com/@zxccccsq" target="_blank" rel="noopener">
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="#eef1f7"><path d="M16.5 3c.4 2 1.8 3.6 3.8 4v2.6c-1.4 0-2.8-.4-4-1.2v6.4c0 3.3-2.7 6-6 6s-6-2.7-6-6 2.7-6 6-6c.4 0 .8 0 1.1.1v2.7a3.3 3.3 0 1 0 2.3 3.2V3h2.8z"/></svg>
        </div>
        <div class="link-text">
          <div class="link-title">TikTok</div>
          <div class="link-sub">@zxccccsq</div>
        </div>
        <div class="link-arrow">→</div>
      </a>

      <a class="link-card" href="https://discord.gg/BCJmhNE2" target="_blank" rel="noopener">
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="#e8e8e8"><path d="M20 5.5a17 17 0 0 0-4.2-1.3l-.2.4a12 12 0 0 1 3.7 1.9c-3.1-1.5-6.2-1.5-9.3-1.5a17 17 0 0 0-1.5-.4l-.2.4A12 12 0 0 1 4 5.5C1.9 8.6 1.3 11.6 1.6 14.6c1.4 1 2.7 1.7 4 2.1l.9-1.3a9 9 0 0 1-1.4-.7l.4-.3c2.6 1.2 5.5 1.2 8.1 0l.4.3c-.4.3-.9.5-1.4.7l.9 1.3c1.3-.4 2.6-1 4-2.1.4-3.5-.5-6.5-2-9zm-9 8c-.8 0-1.4-.7-1.4-1.6s.6-1.6 1.4-1.6 1.4.7 1.4 1.6-.6 1.6-1.4 1.6zm5.5 0c-.8 0-1.4-.7-1.4-1.6s.6-1.6 1.4-1.6 1.4.7 1.4 1.6-.6 1.6-1.4 1.6z"/></svg>
        </div>
        <div class="link-text">
          <div class="link-title">Discord</div>
          <div class="link-sub">discord gua</div>
        </div>
        <div class="link-arrow">→</div>
      </a>
    </div>

    <footer>made with care · tap a link to open</footer>
  </div>


<script>
const v=document.getElementById('bgVideo');
if(v){v.muted=true;v.loop=true;v.play().catch(console.error);}
</script>
</body>
</html>
